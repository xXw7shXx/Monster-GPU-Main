server {
    listen 80;
    server_name w7sh.us www.w7sh.us;

    # Automatic Redirection from HTTP to HTTPS (Site Side)
    # This tells the browser (and Cloudflare) to go to the secure port.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name w7sh.us www.w7sh.us;

    # SSL Certificate Paths (Inside Container)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Modern Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS (Optional but recommended: tells browser to always use HTTPS for 1 year)
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
